<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Find My Teacher</title>
  <link rel="stylesheet" href="./css/main.css">
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
      background: linear-gradient(135deg, #7aba6d 0%, #4CAF50 100%);
    }

    .auth-card {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      max-width: 450px;
      width: 100%;
      animation: fadeIn 0.5s ease-out;
    }

    .auth-card h1 {
      text-align: center;
      color: #2c662d;
      margin-bottom: 10px;
      font-size: 2rem;
    }

    .auth-card .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 1rem;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 600;
    }

    .form-group input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1rem;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #4CAF50;
      box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.2);
    }

    .remember-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .remember-me input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .forgot-password {
      color: #4CAF50;
      text-decoration: none;
      font-size: 0.9rem;
    }

    .forgot-password:hover {
      text-decoration: underline;
    }

    .btn-login {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #22b70e 0%, #4CAF50 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(76, 175, 80, 0.4);
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 25px 0;
      color: #999;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      border-bottom: 1px solid #e0e0e0;
    }

    .divider span {
      padding: 0 15px;
      font-size: 0.9rem;
    }

    .social-login {
      display: flex;
      gap: 15px;
      justify-content: center;
    }

    .social-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 2px solid #e0e0e0;
      background: white;
      font-size: 1.2rem;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .social-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }

    .auth-footer {
      text-align: center;
      margin-top: 25px;
      color: #666;
    }

    .auth-footer a {
      color: #4CAF50;
      text-decoration: none;
      font-weight: 600;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    .logo-center {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo-center img {
      width: 80px;
      border-radius: 15px;
    }

    .user-type-toggle {
      display: flex;
      background: #f0f0f0;
      border-radius: 10px;
      padding: 5px;
      margin-bottom: 25px;
    }

    .user-type-toggle button {
      flex: 1;
      padding: 12px;
      border: none;
      background: transparent;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }

    .user-type-toggle button.active {
      background: #4CAF50;
      color: white;
    }
  </style>
</head>

<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="logo-center">
        <img src="./assets/36adfee3-7844-4445-ac49-ccd6752ac52a.png" alt="Find My Teacher Logo">
      </div>
      <h1>Welcome Back</h1>
      <p class="subtitle">Sign in to your account</p>

      <div class="user-type-toggle">
        <button type="button" class="active" onclick="setUserType('tutor')">I'm a Tutor</button>
        <button type="button" onclick="setUserType('student')">I'm a Student</button>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" required placeholder="your.email@example.com">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required placeholder="Enter your password">
        </div>

        <div class="remember-row">
          <div class="remember-me">
            <input type="checkbox" id="remember" name="remember">
            <label for="remember">Remember me</label>
          </div>
          <a href="#" class="forgot-password">Forgot Password?</a>
        </div>

        <button type="submit" class="btn-login">Sign In</button>
      </form>

      <div class="divider">
        <span>or continue with</span>
      </div>

      <div class="social-login">
        <button class="social-btn" title="Sign in with Google">🔍</button>
        <button class="social-btn" title="Sign in with Facebook">📘</button>
        <button class="social-btn" title="Sign in with WhatsApp">📱</button>
      </div>

      <div class="auth-footer">
        <p>Don't have an account? <a href="register.html">Sign Up</a></p>
        <p style="margin-top: 15px;"><a href="index.html">← Back to Home</a></p>
        <p style="margin-top: 10px;"><a href="contact.html">Need Help? Contact Us</a></p>
      </div>
    </div>
  </div>

  <script>
    function setUserType(type) {
      const buttons = document.querySelectorAll('.user-type-toggle button');
      buttons.forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
    }

    document.getElementById('login-form').addEventListener('submit', function(event) {
      event.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      if (!email || !password) {
        alert('Please fill in all fields.');
        return;
      }
      
      // Simulate login success
      alert('Login successful! Redirecting to your dashboard...');
      window.location.href = 'dashboard.html';
    });
  </script>
</body>

</html>
